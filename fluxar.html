<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#080B10" />
  <title>⚡ FLUXAR</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #080B10; overflow: hidden; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
    }
    #root { height: 100%; }
    * { -webkit-overflow-scrolling: touch; }
    ::-webkit-scrollbar { display: none; }
    input, select { font-size: 16px !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const {
      AreaChart, Area, BarChart, Bar, PieChart, Pie, Cell,
      XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer
    } = Recharts;

    // ─── TOKENS ──────────────────────────────────────────────────
    const C = {
      bg: "#080B10", surface: "#0F1318", card: "#141920", border: "#1C2333",
      personal: "#38BDF8", business: "#A78BFA", green: "#34D399", red: "#F87171",
      yellow: "#FBBF24", text: "#F1F5F9", sub: "#94A3B8", muted: "#475569",
    };

    const fmt = (v) => new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(v);
    const fmtK = (v) => (v >= 1000 ? `R$${(v / 1000).toFixed(0)}k` : `R$${v}`);

    // ─── DADOS INICIAIS ──────────────────────────────────────────
    const seed = () => ({
      balances: { personal: 12450, business: 28670 },
      transactions: [
        { id: 1, type: "income",  amount: 8500,  category: "Salário",     date: "2026-03-01", account: "personal", desc: "Salário março",   method: "PIX",          status: "received" },
        { id: 2, type: "expense", amount: 1200,  category: "Moradia",     date: "2026-03-05", account: "personal", desc: "Aluguel",         method: "Transferência", status: "paid"     },
        { id: 3, type: "income",  amount: 15000, category: "Vendas",      date: "2026-03-03", account: "business", desc: "Projeto X",       method: "PIX",          status: "received" },
        { id: 4, type: "expense", amount: 3200,  category: "Impostos",    date: "2026-03-20", account: "business", desc: "DAS MEI",         method: "Boleto",       status: "pending"  },
        { id: 5, type: "expense", amount: 450,   category: "Alimentação", date: "2026-03-08", account: "personal", desc: "Supermercado",    method: "Cartão",       status: "paid"     },
        { id: 6, type: "income",  amount: 2000,  category: "Honorários",  date: "2026-03-12", account: "business", desc: "Consultoria",     method: "Transferência",status: "received" },
        { id: 7, type: "expense", amount: 890,   category: "Assinaturas", date: "2026-03-25", account: "business", desc: "SaaS Tools",      method: "Cartão",       status: "pending"  },
        { id: 8, type: "expense", amount: 320,   category: "Transporte",  date: "2026-03-07", account: "personal", desc: "Combustível",     method: "Cartão",       status: "paid"     },
      ],
      cards: [
        { id: 1, name: "Nubank",    limit: 10000, used: 3200, account: "personal", closing: 15, due: 22, color: "#8B5CF6" },
        { id: 2, name: "Itaú Biz",  limit: 25000, used: 8900, account: "business", closing: 10, due: 17, color: "#38BDF8" },
      ],
      goals: [
        { id: 1, title: "Reserva de Emergência", target: 30000, current: 18000, account: "personal" },
        { id: 2, title: "Faturamento Q2",         target: 60000, current: 42000, account: "business" },
      ],
      transfers: [
        { id: 1, from: "personal", to: "business", amount: 500, date: "2026-03-02", desc: "Aporte" },
      ],
    });

    const chartData = [
      { m: "Out", r: 14200, d: 11900 }, { m: "Nov", r: 21600, d: 12100 },
      { m: "Dez", r: 27200, d: 14300 }, { m: "Jan", r: 21000, d: 11900 },
      { m: "Fev", r: 23900, d: 13600 }, { m: "Mar", r: 25500, d: 13050 },
    ];
    const pieData = [
      { name: "Moradia",     v: 1200, color: C.business },
      { name: "Alimentação", v: 450,  color: C.green    },
      { name: "Impostos",    v: 3200, color: C.red      },
      { name: "Transporte",  v: 320,  color: C.yellow   },
      { name: "Assinaturas", v: 890,  color: C.personal },
    ];

    // ─── BASE ────────────────────────────────────────────────────
    const Pill = ({ children, color = C.personal, size = "sm" }) => (
      <span style={{ background: color + "20", color, border: `1px solid ${color}35`, borderRadius: 99, padding: size === "sm" ? "3px 10px" : "5px 14px", fontSize: size === "sm" ? 10 : 12, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase" }}>{children}</span>
    );

    const Surface = ({ children, style = {}, glow }) => (
      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 20, padding: 20, boxShadow: glow ? `0 0 40px ${glow}15` : "none", ...style }}>{children}</div>
    );

    const Btn = ({ children, onClick, variant = "primary", color = C.personal, style = {} }) => {
      const s = {
        primary: { background: color, color: "#000", border: "none" },
        outline:  { background: "transparent", color, border: `1.5px solid ${color}60` },
      };
      return (
        <button onClick={onClick} style={{ ...s[variant], borderRadius: 14, padding: "13px 22px", fontSize: 14, fontWeight: 800, cursor: "pointer", fontFamily: "inherit", transition: "opacity .15s", ...style }}
          onTouchStart={e => e.currentTarget.style.opacity = ".7"}
          onTouchEnd={e => e.currentTarget.style.opacity = "1"}
        >{children}</button>
      );
    };

    const Sheet = ({ open, onClose, title, children }) => {
      if (!open) return null;
      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 200, background: "#000000bb", display: "flex", alignItems: "flex-end" }}
          onClick={e => e.target === e.currentTarget && onClose()}>
          <div style={{ background: C.card, borderRadius: "24px 24px 0 0", width: "100%", maxHeight: "92vh", overflowY: "auto", border: `1px solid ${C.border}` }}>
            <style>{`@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}`}</style>
            <div style={{ display: "flex", justifyContent: "center", padding: "14px 0 8px" }}>
              <div style={{ width: 40, height: 4, borderRadius: 99, background: C.border }} />
            </div>
            <div style={{ padding: "0 20px 40px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
                <h3 style={{ color: C.text, fontSize: 18, fontWeight: 800, margin: 0 }}>{title}</h3>
                <button onClick={onClose} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, width: 36, height: 36, color: C.sub, fontSize: 16, cursor: "pointer" }}>✕</button>
              </div>
              {children}
            </div>
          </div>
        </div>
      );
    };

    const Field = ({ label, value, onChange, type = "text", options }) => (
      <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
        <label style={{ color: C.sub, fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase" }}>{label}</label>
        {options ? (
          <select value={value} onChange={e => onChange(e.target.value)} style={{ background: C.surface, border: `1.5px solid ${C.border}`, borderRadius: 14, padding: "14px 16px", color: C.text, fontSize: 16, outline: "none", fontFamily: "inherit", WebkitAppearance: "none", appearance: "none" }}>
            {options.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
          </select>
        ) : (
          <input type={type} value={value} onChange={e => onChange(e.target.value)} style={{ background: C.surface, border: `1.5px solid ${C.border}`, borderRadius: 14, padding: "14px 16px", color: C.text, fontSize: 16, outline: "none", fontFamily: "inherit" }} />
        )}
      </div>
    );

    const Header = ({ title, sub, right }) => (
      <div style={{ padding: "20px 20px 12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ color: C.text, fontSize: 22, fontWeight: 900, letterSpacing: "-0.02em" }}>{title}</div>
          {sub && <div style={{ color: C.muted, fontSize: 13, marginTop: 2 }}>{sub}</div>}
        </div>
        {right}
      </div>
    );

    // ─── LOGIN ────────────────────────────────────────────────────
    const Login = ({ onUnlock }) => {
      const [pin, setPin] = useState("");
      const [err, setErr] = useState(false);
      const [shake, setShake] = useState(false);

      const press = (v) => {
        if (pin.length >= 4) return;
        const next = pin + v;
        setPin(next);
        if (next.length === 4) {
          if (next === "1234") { setTimeout(onUnlock, 300); }
          else setTimeout(() => { setShake(true); setPin(""); setErr(true); setTimeout(() => setShake(false), 400); }, 300);
        }
      };
      const del = () => setPin(p => p.slice(0, -1));

      return (
        <div style={{ minHeight: "100dvh", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 28 }}>
          <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}`}</style>
          <div style={{ textAlign: "center", marginBottom: 52 }}>
            <div style={{ fontSize: 44, fontWeight: 900, letterSpacing: "-0.04em", background: `linear-gradient(135deg,${C.personal},${C.business})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>⚡ FLUXAR</div>
            <div style={{ color: C.muted, fontSize: 14, marginTop: 6 }}>Finanças pessoais e empresariais</div>
          </div>

          <div style={{ display: "flex", gap: 18, marginBottom: 44, animation: shake ? "shake .4s ease" : "none" }}>
            {[0,1,2,3].map(i => (
              <div key={i} style={{ width: 16, height: 16, borderRadius: "50%", background: i < pin.length ? C.personal : C.border, border: `2px solid ${i < pin.length ? C.personal : C.muted}`, boxShadow: i < pin.length ? `0 0 12px ${C.personal}60` : "none", transition: "all .15s" }} />
            ))}
          </div>

          {err && <div style={{ color: C.red, fontSize: 13, marginBottom: 20, fontWeight: 600 }}>PIN incorreto — use 1234</div>}

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14, maxWidth: 280, width: "100%" }}>
            {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((n, i) => (
              <button key={i} onClick={() => n === "⌫" ? del() : n !== "" && press(String(n))}
                style={{ background: n === "" ? "transparent" : C.card, border: n === "" ? "none" : `1px solid ${C.border}`, borderRadius: 18, height: 72, color: n === "⌫" ? C.sub : C.text, fontSize: n === "⌫" ? 20 : 24, fontWeight: 700, cursor: n === "" ? "default" : "pointer", fontFamily: "inherit" }}
                onTouchStart={e => n !== "" && (e.currentTarget.style.background = C.border)}
                onTouchEnd={e => e.currentTarget.style.background = n === "" ? "transparent" : C.card}
              >{n}</button>
            ))}
          </div>
          <div style={{ color: C.muted, fontSize: 12, marginTop: 32 }}>Demo: PIN 1234</div>
        </div>
      );
    };

    // ─── DASHBOARD ────────────────────────────────────────────────
    const Dashboard = ({ data }) => {
      const [acct, setAcct] = useState("all");
      const totalIncome = data.transactions.filter(t => t.type === "income" && (acct === "all" || t.account === acct)).reduce((s, t) => s + t.amount, 0);
      const totalExp    = data.transactions.filter(t => t.type === "expense" && (acct === "all" || t.account === acct)).reduce((s, t) => s + t.amount, 0);
      const health   = Math.min(100, Math.round(((totalIncome - totalExp) / Math.max(totalIncome, 1)) * 100));
      const pending  = data.transactions.filter(t => t.status === "pending");

      return (
        <div style={{ paddingBottom: 100 }}>
          {/* Hero */}
          <div style={{ background: `linear-gradient(160deg,${C.personal}18 0%,${C.bg} 65%)`, padding: "52px 20px 24px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ color: C.sub, fontSize: 13, marginBottom: 4 }}>Patrimônio total</div>
                <div style={{ fontSize: 36, fontWeight: 900, letterSpacing: "-0.03em", color: C.text }}>{fmt(data.balances.personal + data.balances.business)}</div>
              </div>
              <div style={{ width: 44, height: 44, borderRadius: 14, background: `linear-gradient(135deg,${C.personal},${C.business})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>👤</div>
            </div>
            <div style={{ marginTop: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <span style={{ color: C.sub, fontSize: 12 }}>Saúde financeira</span>
                <span style={{ color: C.green, fontWeight: 800, fontSize: 13 }}>{health}%</span>
              </div>
              <div style={{ height: 6, background: C.border, borderRadius: 99 }}>
                <div style={{ width: `${health}%`, height: "100%", background: `linear-gradient(90deg,${C.green},${C.personal})`, borderRadius: 99, transition: "width 1.2s ease" }} />
              </div>
            </div>
          </div>

          {/* Toggle conta */}
          <div style={{ padding: "0 20px 20px" }}>
            <div style={{ display: "flex", gap: 8, background: C.surface, borderRadius: 16, padding: 5 }}>
              {[["all","Todos"],["personal","Pessoal"],["business","Empresa"]].map(([k,l]) => (
                <button key={k} onClick={() => setAcct(k)} style={{ flex: 1, padding: "10px 0", borderRadius: 12, fontSize: 13, fontWeight: 700, background: acct === k ? (k === "personal" ? C.personal : k === "business" ? C.business : C.card) : "transparent", color: acct === k ? (k === "all" ? C.text : "#000") : C.muted, border: "none", cursor: "pointer", fontFamily: "inherit", transition: "all .2s" }}>{l}</button>
              ))}
            </div>
          </div>

          {/* Cards contas scroll */}
          <div style={{ padding: "0 20px 20px", display: "flex", gap: 14, overflowX: "auto", scrollSnapType: "x mandatory" }}>
            {[{ key: "personal", label: "Conta Pessoal", icon: "💼", color: C.personal, bal: data.balances.personal }, { key: "business", label: "Conta Empresa", icon: "🏢", color: C.business, bal: data.balances.business }].map(a => (
              <div key={a.key} style={{ minWidth: 230, scrollSnapAlign: "start", background: `linear-gradient(135deg,${a.color}28,${C.card})`, border: `1px solid ${a.color}40`, borderRadius: 20, padding: 22, flexShrink: 0 }}>
                <div style={{ color: a.color, fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase" }}>{a.icon} {a.label}</div>
                <div style={{ color: C.text, fontSize: 26, fontWeight: 900, marginTop: 10 }}>{fmt(a.bal)}</div>
                <div style={{ color: C.muted, fontSize: 12, marginTop: 4 }}>Disponível</div>
              </div>
            ))}
          </div>

          {/* Stats */}
          <div style={{ padding: "0 20px 20px", display: "flex", gap: 12 }}>
            {[["Receitas", totalIncome, C.green, "↑"], ["Despesas", totalExp, C.red, "↓"]].map(([l, v, c, ic]) => (
              <Surface key={l} style={{ flex: 1, padding: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <div style={{ color: C.sub, fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" }}>{l}</div>
                  <div style={{ width: 26, height: 26, borderRadius: 8, background: c + "20", color: c, fontSize: 14, fontWeight: 900, display: "flex", alignItems: "center", justifyContent: "center" }}>{ic}</div>
                </div>
                <div style={{ color: c, fontSize: 18, fontWeight: 900, marginTop: 8 }}>{fmt(v)}</div>
              </Surface>
            ))}
          </div>

          {/* Gráfico */}
          <div style={{ padding: "0 20px 20px" }}>
            <Surface>
              <div style={{ color: C.text, fontWeight: 800, fontSize: 15, marginBottom: 16 }}>Evolução mensal</div>
              <ResponsiveContainer width="100%" height={175}>
                <AreaChart data={chartData} margin={{ top: 4, right: 0, left: -24, bottom: 0 }}>
                  <defs>
                    <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.green} stopOpacity={0.3}/><stop offset="95%" stopColor={C.green} stopOpacity={0}/></linearGradient>
                    <linearGradient id="gD" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.red} stopOpacity={0.25}/><stop offset="95%" stopColor={C.red} stopOpacity={0}/></linearGradient>
                  </defs>
                  <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                  <XAxis dataKey="m" stroke={C.muted} tick={{ fontSize: 11, fill: C.muted }} />
                  <YAxis stroke={C.muted} tick={{ fontSize: 10, fill: C.muted }} tickFormatter={fmtK} />
                  <Tooltip formatter={v => fmt(v)} contentStyle={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, color: C.text, fontSize: 12 }} />
                  <Area type="monotone" dataKey="r" name="Receitas" stroke={C.green} fill="url(#gR)" strokeWidth={2} />
                  <Area type="monotone" dataKey="d" name="Despesas" stroke={C.red} fill="url(#gD)" strokeWidth={2} />
                </AreaChart>
              </ResponsiveContainer>
            </Surface>
          </div>

          {/* Pendências */}
          {pending.length > 0 && (
            <div style={{ padding: "0 20px 20px" }}>
              <div style={{ color: C.text, fontWeight: 800, fontSize: 15, marginBottom: 12 }}>⚠️ Pendências</div>
              {pending.map(t => (
                <div key={t.id} style={{ background: C.yellow + "15", border: `1px solid ${C.yellow}35`, borderRadius: 16, padding: 16, display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <div>
                    <div style={{ color: C.text, fontSize: 14, fontWeight: 700 }}>{t.desc}</div>
                    <div style={{ color: C.yellow, fontSize: 12, marginTop: 2 }}>Vence {t.date}</div>
                  </div>
                  <div style={{ color: C.red, fontWeight: 900, fontSize: 15 }}>{fmt(t.amount)}</div>
                </div>
              ))}
            </div>
          )}

          {/* Metas */}
          <div style={{ padding: "0 20px 20px" }}>
            <div style={{ color: C.text, fontWeight: 800, fontSize: 15, marginBottom: 12 }}>🎯 Metas</div>
            {data.goals.map(g => {
              const pct = Math.round((g.current / g.target) * 100);
              const col = g.account === "personal" ? C.personal : C.business;
              return (
                <Surface key={g.id} style={{ padding: 18, marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
                    <div>
                      <div style={{ color: C.text, fontSize: 14, fontWeight: 700, marginBottom: 6 }}>{g.title}</div>
                      <Pill color={col}>{g.account === "personal" ? "Pessoal" : "Empresa"}</Pill>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ color: col, fontWeight: 900, fontSize: 18 }}>{pct}%</div>
                      <div style={{ color: C.muted, fontSize: 11 }}>{fmt(g.current)}</div>
                    </div>
                  </div>
                  <div style={{ height: 8, background: C.border, borderRadius: 99 }}>
                    <div style={{ width: `${pct}%`, height: "100%", background: `linear-gradient(90deg,${col},${col}aa)`, borderRadius: 99, transition: "width 1.2s ease" }} />
                  </div>
                  <div style={{ color: C.muted, fontSize: 11, marginTop: 6, textAlign: "right" }}>Meta: {fmt(g.target)}</div>
                </Surface>
              );
            })}
          </div>

          {/* Recentes */}
          <div style={{ padding: "0 20px" }}>
            <div style={{ color: C.text, fontWeight: 800, fontSize: 15, marginBottom: 12 }}>Recentes</div>
            <Surface style={{ padding: 0, overflow: "hidden" }}>
              {data.transactions.slice(0, 6).map((t, i) => (
                <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "16px 18px", borderBottom: i < 5 ? `1px solid ${C.border}` : "none" }}>
                  <div style={{ width: 44, height: 44, borderRadius: 14, background: (t.type === "income" ? C.green : C.red) + "20", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>
                    {t.type === "income" ? "📥" : "📤"}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ color: C.text, fontSize: 14, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.desc}</div>
                    <div style={{ display: "flex", gap: 6, marginTop: 3, alignItems: "center" }}>
                      <span style={{ color: C.muted, fontSize: 12 }}>{t.category}</span>
                      <Pill color={t.account === "personal" ? C.personal : C.business}>{t.account === "personal" ? "PF" : "PJ"}</Pill>
                    </div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    <div style={{ color: t.type === "income" ? C.green : C.red, fontSize: 15, fontWeight: 800 }}>{t.type === "income" ? "+" : "-"}{fmt(t.amount)}</div>
                    <Pill color={t.status === "pending" ? C.yellow : C.green}>{t.status === "pending" ? "Pendente" : "OK"}</Pill>
                  </div>
                </div>
              ))}
            </Surface>
          </div>
        </div>
      );
    };

    // ─── TRANSAÇÕES ───────────────────────────────────────────────
    const Transactions = ({ data, setData }) => {
      const [filter, setFilter] = useState("all");
      const [acct, setAcct]     = useState("all");
      const [sheet, setSheet]   = useState(false);
      const [form, setForm]     = useState({ type: "expense", amount: "", category: "", desc: "", date: new Date().toISOString().split("T")[0], account: "personal", method: "PIX", status: "pending" });

      const cats = {
        income:  ["Salário","Honorários","Vendas","Comissão","Outros"],
        expense: ["Moradia","Alimentação","Transporte","Saúde","Impostos","Assinaturas","Marketing","Outros"],
      };
      const list = data.transactions.filter(t => (filter === "all" || t.type === filter) && (acct === "all" || t.account === acct));

      const save = () => {
        if (!form.amount || !form.category) return;
        const amt = parseFloat(form.amount);
        setData(d => ({
          ...d,
          transactions: [{ ...form, id: Date.now(), amount: amt }, ...d.transactions],
          balances: { ...d.balances, [form.account]: d.balances[form.account] + (form.type === "income" ? amt : -amt) },
        }));
        setSheet(false);
        setForm({ type: "expense", amount: "", category: "", desc: "", date: new Date().toISOString().split("T")[0], account: "personal", method: "PIX", status: "pending" });
      };

      return (
        <div style={{ paddingBottom: 100 }}>
          <Header title="Transações" right={
            <button onClick={() => setSheet(true)} style={{ width: 44, height: 44, borderRadius: 14, background: C.personal, border: "none", color: "#000", fontSize: 24, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900 }}>+</button>
          } />
          <div style={{ padding: "0 20px 16px", display: "flex", gap: 8, overflowX: "auto" }}>
            {[["all","Todas"],["income","Receitas"],["expense","Despesas"]].map(([k,l]) => (
              <button key={k} onClick={() => setFilter(k)} style={{ flexShrink: 0, padding: "9px 18px", borderRadius: 99, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", background: filter === k ? C.personal : C.card, color: filter === k ? "#000" : C.sub, border: `1px solid ${filter === k ? C.personal : C.border}` }}>{l}</button>
            ))}
            <div style={{ width: 1, background: C.border, flexShrink: 0, margin: "0 4px" }} />
            {[["all","Todos"],["personal","PF"],["business","PJ"]].map(([k,l]) => (
              <button key={k} onClick={() => setAcct(k)} style={{ flexShrink: 0, padding: "9px 18px", borderRadius: 99, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", background: acct === k ? (k === "personal" ? C.personal : k === "business" ? C.business : C.card) : "transparent", color: acct === k ? (k === "all" ? C.text : "#000") : C.muted, border: `1px solid ${acct === k ? (k === "personal" ? C.personal : k === "business" ? C.business : C.border) : C.border}` }}>{l}</button>
            ))}
          </div>

          <div style={{ padding: "0 20px" }}>
            <Surface style={{ padding: 0, overflow: "hidden" }}>
              {list.map((t, i) => (
                <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "16px 18px", borderBottom: i < list.length - 1 ? `1px solid ${C.border}` : "none" }}>
                  <div style={{ width: 46, height: 46, borderRadius: 15, background: (t.type === "income" ? C.green : C.red) + "20", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>
                    {t.type === "income" ? "📥" : "📤"}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ color: C.text, fontSize: 14, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.desc}</div>
                    <div style={{ display: "flex", gap: 6, marginTop: 4, alignItems: "center", flexWrap: "wrap" }}>
                      <span style={{ color: C.muted, fontSize: 12 }}>{t.category} · {t.date}</span>
                      <Pill color={t.account === "personal" ? C.personal : C.business}>{t.account === "personal" ? "PF" : "PJ"}</Pill>
                    </div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    <div style={{ color: t.type === "income" ? C.green : C.red, fontSize: 15, fontWeight: 800 }}>{t.type === "income" ? "+" : "-"}{fmt(t.amount)}</div>
                    <Pill color={t.status === "pending" ? C.yellow : C.green}>{t.status === "pending" ? "Pendente" : "OK"}</Pill>
                  </div>
                </div>
              ))}
            </Surface>
          </div>

          <Sheet open={sheet} onClose={() => setSheet(false)} title="Nova Transação">
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <div style={{ display: "flex", gap: 10 }}>
                {["income","expense"].map(tp => (
                  <button key={tp} onClick={() => setForm(f => ({ ...f, type: tp, category: "" }))} style={{ flex: 1, padding: 16, borderRadius: 16, border: `2px solid ${form.type === tp ? (tp === "income" ? C.green : C.red) : C.border}`, background: form.type === tp ? (tp === "income" ? C.green : C.red) + "22" : C.surface, color: form.type === tp ? (tp === "income" ? C.green : C.red) : C.muted, fontWeight: 800, fontSize: 15, cursor: "pointer", fontFamily: "inherit" }}>
                    {tp === "income" ? "📥 Receita" : "📤 Despesa"}
                  </button>
                ))}
              </div>
              <Field label="Valor (R$)" value={form.amount} onChange={v => setForm(f => ({ ...f, amount: v }))} type="number" />
              <Field label="Descrição" value={form.desc} onChange={v => setForm(f => ({ ...f, desc: v }))} />
              <Field label="Categoria" value={form.category} onChange={v => setForm(f => ({ ...f, category: v }))} options={cats[form.type].map(c => ({ v: c, l: c }))} />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <Field label="Conta" value={form.account} onChange={v => setForm(f => ({ ...f, account: v }))} options={[{ v: "personal", l: "💼 Pessoal" }, { v: "business", l: "🏢 Empresa" }]} />
                <Field label="Método" value={form.method} onChange={v => setForm(f => ({ ...f, method: v }))} options={["PIX","Cartão","Transferência","Boleto"].map(m => ({ v: m, l: m }))} />
              </div>
              <Field label="Data" value={form.date} onChange={v => setForm(f => ({ ...f, date: v }))} type="date" />
              <Btn onClick={save} style={{ width: "100%", padding: 16, borderRadius: 16 }}>Salvar</Btn>
            </div>
          </Sheet>
        </div>
      );
    };

    // ─── CARTÕES ──────────────────────────────────────────────────
    const Cards = ({ data, setData }) => {
      const [sheet, setSheet] = useState(false);
      const [form, setForm]   = useState({ name: "", limit: "", account: "personal", closing: "15", due: "22", color: "#38BDF8" });

      const save = () => {
        if (!form.name || !form.limit) return;
        setData(d => ({ ...d, cards: [...d.cards, { ...form, id: Date.now(), limit: parseFloat(form.limit), used: 0, closing: parseInt(form.closing), due: parseInt(form.due) }] }));
        setSheet(false);
        setForm({ name: "", limit: "", account: "personal", closing: "15", due: "22", color: "#38BDF8" });
      };

      return (
        <div style={{ paddingBottom: 100 }}>
          <Header title="Cartões" right={
            <button onClick={() => setSheet(true)} style={{ width: 44, height: 44, borderRadius: 14, background: C.personal, border: "none", color: "#000", fontSize: 24, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
          } />
          <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 20 }}>
            {data.cards.map(card => {
              const pct = Math.round((card.used / card.limit) * 100);
              return (
                <div key={card.id} style={{ borderRadius: 24, padding: 24, background: `linear-gradient(140deg,${card.color}40 0%,${C.card} 60%)`, border: `1px solid ${card.color}50`, overflow: "hidden", position: "relative" }}>
                  <div style={{ position: "absolute", top: -30, right: -30, width: 160, height: 160, borderRadius: "50%", background: card.color + "12" }} />
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
                    <div>
                      <Pill color={card.account === "personal" ? C.personal : C.business}>{card.account === "personal" ? "Pessoal" : "Empresa"}</Pill>
                      <div style={{ color: C.text, fontSize: 20, fontWeight: 800, marginTop: 10 }}>{card.name}</div>
                    </div>
                    <div style={{ fontSize: 40 }}>💳</div>
                  </div>
                  <div style={{ marginBottom: 18 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                      <span style={{ color: C.sub, fontSize: 12 }}>Uso do limite</span>
                      <span style={{ color: pct > 80 ? C.red : C.text, fontSize: 13, fontWeight: 800 }}>{pct}%</span>
                    </div>
                    <div style={{ height: 10, background: C.border, borderRadius: 99 }}>
                      <div style={{ width: `${pct}%`, height: "100%", background: pct > 80 ? C.red : card.color, borderRadius: 99, boxShadow: `0 0 10px ${pct > 80 ? C.red : card.color}80`, transition: "width 1s ease" }} />
                    </div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 14 }}>
                    {[["Limite", fmt(card.limit), C.text], ["Utilizado", fmt(card.used), C.red], ["Disponível", fmt(card.limit - card.used), C.green]].map(([l, v, c]) => (
                      <div key={l} style={{ background: "#00000040", borderRadius: 12, padding: "12px 8px", textAlign: "center" }}>
                        <div style={{ color: C.muted, fontSize: 9, fontWeight: 700, textTransform: "uppercase", marginBottom: 4 }}>{l}</div>
                        <div style={{ color: c, fontSize: 12, fontWeight: 800 }}>{v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 10 }}>
                    {[["Fechamento", `Dia ${card.closing}`, C.text], ["Vencimento", `Dia ${card.due}`, C.yellow]].map(([l, v, c]) => (
                      <div key={l} style={{ flex: 1, background: "#00000040", borderRadius: 12, padding: 12, textAlign: "center" }}>
                        <div style={{ color: C.muted, fontSize: 10, textTransform: "uppercase" }}>{l}</div>
                        <div style={{ color: c, fontSize: 16, fontWeight: 800, marginTop: 2 }}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>

          <Sheet open={sheet} onClose={() => setSheet(false)} title="Novo Cartão">
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <Field label="Nome do Cartão" value={form.name} onChange={v => setForm(f => ({ ...f, name: v }))} />
              <Field label="Limite (R$)" value={form.limit} onChange={v => setForm(f => ({ ...f, limit: v }))} type="number" />
              <Field label="Conta" value={form.account} onChange={v => setForm(f => ({ ...f, account: v }))} options={[{ v: "personal", l: "💼 Pessoal" }, { v: "business", l: "🏢 Empresa" }]} />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <Field label="Fechamento (dia)" value={form.closing} onChange={v => setForm(f => ({ ...f, closing: v }))} type="number" />
                <Field label="Vencimento (dia)" value={form.due} onChange={v => setForm(f => ({ ...f, due: v }))} type="number" />
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <label style={{ color: C.sub, fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase" }}>Cor</label>
                <div style={{ display: "flex", gap: 12 }}>
                  {["#38BDF8","#A78BFA","#34D399","#FBBF24","#F87171","#F472B6"].map(c => (
                    <div key={c} onClick={() => setForm(f => ({ ...f, color: c }))} style={{ width: 40, height: 40, borderRadius: 12, background: c, cursor: "pointer", border: `3px solid ${form.color === c ? "#fff" : "transparent"}`, transition: "border .2s" }} />
                  ))}
                </div>
              </div>
              <Btn onClick={save} style={{ width: "100%", padding: 16, borderRadius: 16 }}>Adicionar Cartão</Btn>
            </div>
          </Sheet>
        </div>
      );
    };

    // ─── TRANSFERÊNCIAS ───────────────────────────────────────────
    const Transfers = ({ data, setData }) => {
      const [form, setForm] = useState({ from: "personal", to: "business", amount: "", desc: "" });
      const [done, setDone] = useState(false);

      const go = () => {
        if (!form.amount || form.from === form.to) return;
        const amt = parseFloat(form.amount);
        setData(d => ({
          ...d,
          transfers: [{ ...form, id: Date.now(), amount: amt, date: new Date().toISOString().split("T")[0] }, ...d.transfers],
          balances: { ...d.balances, [form.from]: d.balances[form.from] - amt, [form.to]: d.balances[form.to] + amt },
        }));
        setForm({ from: "personal", to: "business", amount: "", desc: "" });
        setDone(true);
        setTimeout(() => setDone(false), 2500);
      };

      return (
        <div style={{ paddingBottom: 100 }}>
          <Header title="Transferências" sub="Entre contas" />
          <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 16 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {[{ k: "personal", l: "Pessoal", c: C.personal }, { k: "business", l: "Empresa", c: C.business }].map(a => (
                <Surface key={a.k} style={{ padding: 18 }} glow={a.c}>
                  <Pill color={a.c}>{a.l}</Pill>
                  <div style={{ color: a.c, fontSize: 20, fontWeight: 900, marginTop: 10 }}>{fmt(data.balances[a.k])}</div>
                </Surface>
              ))}
            </div>

            <Surface>
              <div style={{ color: C.text, fontWeight: 800, fontSize: 16, marginBottom: 20 }}>Nova transferência</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 10, alignItems: "end" }}>
                  <Field label="De" value={form.from} onChange={v => setForm(f => ({ ...f, from: v }))} options={[{ v: "personal", l: "💼 Pessoal" }, { v: "business", l: "🏢 Empresa" }]} />
                  <div style={{ paddingBottom: 14, color: C.personal, fontSize: 24, textAlign: "center" }}>→</div>
                  <Field label="Para" value={form.to} onChange={v => setForm(f => ({ ...f, to: v }))} options={[{ v: "personal", l: "💼 Pessoal" }, { v: "business", l: "🏢 Empresa" }]} />
                </div>
                <Field label="Valor (R$)" value={form.amount} onChange={v => setForm(f => ({ ...f, amount: v }))} type="number" />
                <Field label="Descrição (opcional)" value={form.desc} onChange={v => setForm(f => ({ ...f, desc: v }))} />
                {done && <div style={{ background: C.green + "20", border: `1px solid ${C.green}40`, borderRadius: 14, padding: 14, color: C.green, fontWeight: 700, textAlign: "center" }}>✓ Transferência realizada!</div>}
                <Btn onClick={go} style={{ width: "100%", padding: 16, borderRadius: 16 }}>Transferir</Btn>
              </div>
            </Surface>

            <div>
              <div style={{ color: C.text, fontWeight: 800, fontSize: 15, marginBottom: 12 }}>Histórico</div>
              <Surface style={{ padding: 0, overflow: "hidden" }}>
                {data.transfers.map((t, i) => (
                  <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "16px 18px", borderBottom: i < data.transfers.length - 1 ? `1px solid ${C.border}` : "none" }}>
                    <div style={{ width: 44, height: 44, borderRadius: 14, background: C.personal + "20", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>🔄</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ color: C.text, fontSize: 14, fontWeight: 600 }}>{t.desc || "Transferência"}</div>
                      <div style={{ display: "flex", gap: 6, marginTop: 4, alignItems: "center" }}>
                        <Pill color={t.from === "personal" ? C.personal : C.business}>{t.from === "personal" ? "PF" : "PJ"}</Pill>
                        <span style={{ color: C.personal }}>→</span>
                        <Pill color={t.to === "personal" ? C.personal : C.business}>{t.to === "personal" ? "PF" : "PJ"}</Pill>
                      </div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ color: C.personal, fontWeight: 800, fontSize: 15 }}>{fmt(t.amount)}</div>
                      <div style={{ color: C.muted, fontSize: 12 }}>{t.date}</div>
                    </div>
                  </div>
                ))}
              </Surface>
            </div>
          </div>
        </div>
      );
    };

    // ─── RELATÓRIOS ───────────────────────────────────────────────
    const Reports = ({ data }) => {
      const pI = data.transactions.filter(t => t.type==="income"  && t.account==="personal").reduce((s,t)=>s+t.amount,0);
      const pE = data.transactions.filter(t => t.type==="expense" && t.account==="personal").reduce((s,t)=>s+t.amount,0);
      const bI = data.transactions.filter(t => t.type==="income"  && t.account==="business").reduce((s,t)=>s+t.amount,0);
      const bE = data.transactions.filter(t => t.type==="expense" && t.account==="business").reduce((s,t)=>s+t.amount,0);
      const tI = pI + bI, tE = pE + bE;

      return (
        <div style={{ paddingBottom: 100 }}>
          <Header title="Relatórios" sub="Março 2026" />
          <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 14 }}>
            {[["Receita Total", tI, C.green, "📈"], ["Despesa Total", tE, C.red, "📤"], ["Resultado Líquido", tI - tE, C.personal, "💰"]].map(([l,v,c,ic]) => (
              <Surface key={l} glow={c} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: 20 }}>
                <div>
                  <div style={{ color: C.sub, fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.07em" }}>{l}</div>
                  <div style={{ color: c, fontSize: 26, fontWeight: 900, marginTop: 6, letterSpacing: "-0.02em" }}>{fmt(v)}</div>
                </div>
                <div style={{ fontSize: 34 }}>{ic}</div>
              </Surface>
            ))}

            {[{ l: "Pessoal", inc: pI, exp: pE, c: C.personal }, { l: "Empresarial", inc: bI, exp: bE, c: C.business }].map(a => (
              <Surface key={a.l} glow={a.c}>
                <Pill color={a.c} size="md">{a.l}</Pill>
                <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 16 }}>
                  {[["Receitas", a.inc, C.green], ["Despesas", a.exp, C.red], ["Resultado", a.inc - a.exp, a.c]].map(([l,v,c]) => (
                    <div key={l} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 14px", background: C.surface, borderRadius: 12 }}>
                      <span style={{ color: C.sub, fontSize: 14 }}>{l}</span>
                      <span style={{ color: c, fontWeight: 800, fontSize: 15 }}>{fmt(v)}</span>
                    </div>
                  ))}
                </div>
              </Surface>
            ))}

            <Surface>
              <div style={{ color: C.text, fontWeight: 800, fontSize: 15, marginBottom: 16 }}>Fluxo de Caixa</div>
              <ResponsiveContainer width="100%" height={190}>
                <BarChart data={chartData} margin={{ top: 4, right: 0, left: -24, bottom: 0 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                  <XAxis dataKey="m" stroke={C.muted} tick={{ fontSize: 11, fill: C.muted }} />
                  <YAxis stroke={C.muted} tick={{ fontSize: 10, fill: C.muted }} tickFormatter={fmtK} />
                  <Tooltip formatter={v => fmt(v)} contentStyle={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, color: C.text, fontSize: 12 }} />
                  <Bar dataKey="r" name="Receita" fill={C.green} radius={[4,4,0,0]} />
                  <Bar dataKey="d" name="Despesa" fill={C.red}   radius={[4,4,0,0]} />
                </BarChart>
              </ResponsiveContainer>
            </Surface>

            <Surface>
              <div style={{ color: C.text, fontWeight: 800, fontSize: 15, marginBottom: 16 }}>Por Categoria</div>
              <ResponsiveContainer width="100%" height={180}>
                <PieChart>
                  <Pie data={pieData} dataKey="v" cx="50%" cy="50%" innerRadius={50} outerRadius={82} strokeWidth={0}>
                    {pieData.map((e, i) => <Cell key={i} fill={e.color} />)}
                  </Pie>
                  <Tooltip formatter={v => fmt(v)} contentStyle={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, color: C.text, fontSize: 12 }} />
                </PieChart>
              </ResponsiveContainer>
              <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 8 }}>
                {pieData.map(p => (
                  <div key={p.name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ width: 10, height: 10, borderRadius: 3, background: p.color }} />
                      <span style={{ color: C.sub, fontSize: 14 }}>{p.name}</span>
                    </div>
                    <span style={{ color: C.text, fontWeight: 700, fontSize: 14 }}>{fmt(p.v)}</span>
                  </div>
                ))}
              </div>
            </Surface>
          </div>
        </div>
      );
    };

    // ─── TAB BAR ─────────────────────────────────────────────────
    const tabs = [
      { id: "home",         icon: "⚡", label: "Início"    },
      { id: "transactions", icon: "↕️", label: "Lançar"    },
      { id: "cards",        icon: "💳", label: "Cartões"   },
      { id: "transfers",    icon: "🔄", label: "Mover"     },
      { id: "reports",      icon: "📊", label: "Relatório" },
    ];

    const TabBar = ({ active, setActive }) => (
      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, zIndex: 100, background: C.surface + "ee", borderTop: `1px solid ${C.border}`, display: "flex", backdropFilter: "blur(24px)", WebkitBackdropFilter: "blur(24px)", paddingBottom: "env(safe-area-inset-bottom,8px)" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setActive(t.id)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "10px 4px 8px", background: "none", border: "none", cursor: "pointer" }}>
            <div style={{ width: 46, height: 30, borderRadius: 15, display: "flex", alignItems: "center", justifyContent: "center", background: active === t.id ? C.personal + "22" : "transparent", transition: "background .2s" }}>
              <span style={{ fontSize: 20 }}>{t.icon}</span>
            </div>
            <span style={{ color: active === t.id ? C.personal : C.muted, fontSize: 10, fontWeight: active === t.id ? 800 : 500, transition: "color .2s" }}>{t.label}</span>
          </button>
        ))}
      </div>
    );

    // ─── APP ROOT ────────────────────────────────────────────────
    const App = () => {
      const [locked, setLocked] = useState(true);
      const [tab, setTab]       = useState("home");
      const [data, setData]     = useState(seed);

      const pages = {
        home:         <Dashboard    data={data} setData={setData} />,
        transactions: <Transactions data={data} setData={setData} />,
        cards:        <Cards        data={data} setData={setData} />,
        transfers:    <Transfers    data={data} setData={setData} />,
        reports:      <Reports      data={data} />,
      };

      if (locked) return <Login onUnlock={() => setLocked(false)} />;

      return (
        <div style={{ height: "100dvh", background: C.bg, fontFamily: "'DM Sans',system-ui,sans-serif", color: C.text, maxWidth: 480, margin: "0 auto", display: "flex", flexDirection: "column", position: "relative" }}>
          <div style={{ flex: 1, overflowY: "auto" }}>
            {pages[tab]}
          </div>
          <TabBar active={tab} setActive={setTab} />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
