<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#04070f"/>
<title>⚡ FLUXAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04070f;--bg2:#080d18;--card:#0c1220;--border:#162035;--border2:#1e2d47;
  --p:#4af0c4;--p2:#22d3a8;--b:#7c6dfa;--b2:#6557e8;
  --green:#3dffa0;--red:#ff5f7e;--yellow:#ffd166;
  --text:#e8f0ff;--sub:#7a90b8;--muted:#3a4d6b;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);overflow:hidden;color:var(--text)}
body{font-family:var(--font-body);-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
#root{height:100%}
::-webkit-scrollbar{display:none}
input,select,button{font-family:var(--font-body)}
input,select{font-size:16px!important}
button{cursor:pointer}

.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;opacity:.3}
.glow{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(120px);opacity:.1}
.glow1{width:600px;height:600px;background:var(--p);top:-200px;left:-100px}
.glow2{width:500px;height:500px;background:var(--b);bottom:-200px;right:-100px}

/* AUTH */
.auth-wrap{position:relative;z-index:10;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.auth-box{background:var(--card);border:1px solid var(--border2);border-radius:28px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 0 80px rgba(74,240,196,.05),0 24px 64px rgba(0,0,0,.6)}
.logo-text{font-family:var(--font-head);font-size:30px;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,var(--p),var(--b));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{color:var(--sub);font-size:13px;margin-bottom:32px;margin-top:2px}
.auth-tabs{display:flex;background:var(--bg2);border-radius:14px;padding:4px;margin-bottom:24px;border:1px solid var(--border)}
.auth-tabs button{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:600;transition:all .2s;background:transparent;color:var(--muted)}
.auth-tabs button.act{background:var(--border2);color:var(--text)}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.field label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--sub)}
.field input,.field select{background:var(--bg2);border:1.5px solid var(--border2);border-radius:14px;padding:13px 16px;color:var(--text);outline:none;transition:border .2s;width:100%}
.field input:focus,.field select:focus{border-color:var(--p)}
.field select{-webkit-appearance:none;appearance:none}
.btn-go{width:100%;padding:15px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--p),var(--p2));color:#000;font-size:15px;font-weight:800;letter-spacing:.01em;font-family:var(--font-head);transition:opacity .15s;margin-top:4px}
.btn-go:active{opacity:.8}
.plans{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;margin-top:4px}
.plan{border:2px solid var(--border2);border-radius:16px;padding:14px;cursor:pointer;transition:all .2s;background:var(--bg2);text-align:left}
.plan.sel{border-color:var(--p);background:rgba(74,240,196,.07)}
.plan.sel-b{border-color:var(--b);background:rgba(124,109,250,.07)}
.plan-name{font-family:var(--font-head);font-weight:800;font-size:14px;margin-bottom:2px}
.plan-price{font-family:var(--font-head);font-size:22px;font-weight:900;color:var(--p)}
.plan-price.b{color:var(--b)}
.plan-period{font-size:11px;color:var(--sub)}
.plan-feats{font-size:11px;color:var(--sub);margin-top:8px;line-height:1.6}
.err{background:rgba(255,95,126,.1);border:1px solid rgba(255,95,126,.25);border-radius:12px;padding:11px 14px;color:var(--red);font-size:13px;margin-bottom:14px}
.suc{background:rgba(61,255,160,.1);border:1px solid rgba(61,255,160,.25);border-radius:12px;padding:11px 14px;color:var(--green);font-size:13px;margin-bottom:14px}
.link{color:var(--p);cursor:pointer;font-weight:600}

/* APP */
.app{position:relative;z-index:10;height:100dvh;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
.scroll{flex:1;overflow-y:auto;padding-bottom:100px}

/* TABBAR */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100;
  background:rgba(8,13,24,.9);border-top:1px solid var(--border2);display:flex;
  padding-bottom:env(safe-area-inset-bottom,6px);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.tb-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 7px;background:none;border:none}
.tb-ic{width:42px;height:27px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;transition:background .2s}
.tb-lb{font-size:10px;font-weight:600;color:var(--muted);transition:color .2s}
.tb-btn.on .tb-ic{background:rgba(74,240,196,.14)}
.tb-btn.on .tb-lb{color:var(--p)}

/* PAGE */
.phdr{padding:48px 20px 14px;display:flex;justify-content:space-between;align-items:flex-end}
.ptitle{font-family:var(--font-head);font-size:26px;font-weight:800;letter-spacing:-.02em}
.psub{color:var(--sub);font-size:13px;margin-top:2px}

/* CARD */
.c{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px}
.pill{display:inline-flex;align-items:center;border-radius:99px;padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}

/* SHEET */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);display:flex;align-items:flex-end}
.sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;border:1px solid var(--border2);animation:slideUp .3s cubic-bezier(.22,1,.36,1)}
.sh-handle{display:flex;justify-content:center;padding:13px 0 6px}
.sh-handle div{width:38px;height:4px;border-radius:99px;background:var(--border2)}
.sh-body{padding:0 20px 44px}
.sh-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.sh-title{font-family:var(--font-head);font-size:18px;font-weight:800}
.sh-close{background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;color:var(--sub);font-size:16px}

/* TX */
.tx{display:flex;align-items:center;gap:13px;padding:15px 18px}
.tx-ic{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;font-weight:900}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-meta{display:flex;gap:5px;margin-top:3px;align-items:center;flex-wrap:wrap}
.tx-amt{text-align:right;flex-shrink:0}

/* CHIPS */
.chips{display:flex;gap:8px;overflow-x:auto;padding:0 20px 14px}
.chip{flex-shrink:0;padding:8px 16px;border-radius:99px;font-size:13px;font-weight:600;border:none;transition:all .2s}

/* PLAN BAR */
.plan-bar{margin:0 20px 18px;background:linear-gradient(135deg,rgba(124,109,250,.1),rgba(74,240,196,.07));border:1px solid var(--border2);border-radius:16px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.badge{display:inline-block;border-radius:99px;padding:3px 10px;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.badge-free{background:rgba(74,240,196,.12);color:var(--p);border:1px solid rgba(74,240,196,.25)}
.badge-pro{background:rgba(124,109,250,.12);color:var(--b);border:1px solid rgba(124,109,250,.25)}

/* BTN */
.btn{border:none;border-radius:14px;padding:13px 20px;font-size:14px;font-weight:800;font-family:var(--font-head);transition:opacity .15s;letter-spacing:.01em}
.btn:active{opacity:.75}
.btn-ic{width:44px;height:44px;border-radius:13px;border:none;font-size:20px;display:flex;align-items:center;justify-content:center;font-weight:900}
.btn-outline{background:transparent;font-size:14px;font-weight:700;border-radius:13px;padding:9px 16px;transition:opacity .15s;border:1.5px solid}

/* ANIM */
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pgaim{animation:fadeIn .22s ease}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow glow1"></div>
<div class="glow glow2"></div>
<div id="root"></div>
<script>

/* ─── STORAGE ─── */
const DB={
  _k:k=>'fx_'+k,
  get(k){try{return JSON.parse(localStorage.getItem(this._k(k)))}catch{return null}},
  set(k,v){localStorage.setItem(this._k(k),JSON.stringify(v))},
  del(k){localStorage.removeItem(this._k(k))},
  users(){return this.get('users')||{}},
  saveUsers(u){this.set('users',u)},
  session(){return this.get('sess')},
  saveSession(s){this.set('sess',s)},
  clearSession(){this.del('sess')},
  userData(uid){return this.get('d_'+uid)||emptyData()},
  saveData(uid,d){this.set('d_'+uid,d)},
};

function emptyData(){return{balances:{personal:0,business:0},transactions:[],cards:[],goals:[],transfers:[]}}
const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
const fmt=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);
const today=()=>new Date().toISOString().split('T')[0];
function hash(s){let h=5381;for(let i=0;i<s.length;i++)h=(h*33)^s.charCodeAt(i);return(h>>>0).toString(36)}

/* ─── STATE ─── */
let S={
  view:'auth',authTab:'login',plan:'free',
  user:null,data:null,
  tab:'home',sheet:null,sf:{},
  filterT:'all',filterA:'all',
  err:'',ok:'',
};

function set(patch){
  const p=typeof patch==='function'?patch(S):patch;
  Object.assign(S,p);
  draw();
}

/* ─── DRAW ─── */
function draw(){
  const root=document.getElementById('root');
  root.innerHTML=S.view==='auth'?authHTML():appHTML();
}

/* ════════════════════════════════════
   AUTH
════════════════════════════════════ */
function authHTML(){
  return`<div class="auth-wrap"><div class="auth-box">
  <div class="logo-text">⚡ FLUXAR</div>
  <div class="logo-sub">Controle financeiro inteligente</div>
  <div class="auth-tabs">
    <button class="${S.authTab==='login'?'act':''}" onclick="switchTab('login')">Entrar</button>
    <button class="${S.authTab==='register'?'act':''}" onclick="switchTab('register')">Criar conta</button>
  </div>
  ${S.err?`<div class="err">${S.err}</div>`:''}
  ${S.ok?`<div class="suc">${S.ok}</div>`:''}
  ${S.authTab==='login'?loginForm():registerForm()}
  </div></div>`;
}

function loginForm(){return`
  <div class="field"><label>E-mail</label><input type="email" id="em" placeholder="seu@email.com" autocomplete="email"/></div>
  <div class="field"><label>Senha</label><input type="password" id="pw" placeholder="••••••••" autocomplete="current-password"/></div>
  <button class="btn-go" onclick="doLogin()">Entrar na conta →</button>
  <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--muted)">
    Sem conta? <span class="link" onclick="switchTab('register')">Criar grátis</span>
  </div>`;}

function registerForm(){return`
  <div class="field"><label>Nome completo</label><input type="text" id="nm" placeholder="Seu nome"/></div>
  <div class="field"><label>E-mail</label><input type="email" id="em" placeholder="seu@email.com" autocomplete="email"/></div>
  <div class="field"><label>Senha</label><input type="password" id="pw" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/></div>
  <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);margin:14px 0 10px">Escolha seu plano</div>
  <div class="plans">
    <div class="plan ${S.plan==='free'?'sel':''}" onclick="setPlan('free')">
      <div class="plan-name">Free</div>
      <div class="plan-price">R$0</div>
      <div class="plan-period">/mês para sempre</div>
      <div class="plan-feats">✓ 1 conta PF ou PJ<br>✓ 30 lançamentos/mês<br>✓ Relatório básico</div>
    </div>
    <div class="plan ${S.plan==='pro'?'sel-b':''}" onclick="setPlan('pro')">
      <div class="plan-name" style="color:var(--b)">Pro ✦</div>
      <div class="plan-price b">R$29</div>
      <div class="plan-period">/mês</div>
      <div class="plan-feats">✓ PF + PJ ilimitado<br>✓ Sem limite de lançamentos<br>✓ Relatórios avançados</div>
    </div>
  </div>
  <button class="btn-go" onclick="doRegister()" style="${S.plan==='pro'?'background:linear-gradient(135deg,var(--b),var(--b2));color:#fff':''}">
    ${S.plan==='pro'?'Iniciar teste gratuito →':'Criar conta grátis →'}
  </button>
  <div style="text-align:center;margin-top:12px;font-size:11px;color:var(--muted)">
    Ao criar, você aceita os <span class="link">termos de uso</span>
  </div>`;}

window.switchTab=t=>set({authTab:t,err:'',ok:''});
window.setPlan=p=>set({plan:p,err:'',ok:''});

window.doLogin=()=>{
  const em=val('em'),pw=val('pw');
  if(!em||!pw){set({err:'Preencha e-mail e senha'});return}
  const users=DB.users();
  const user=Object.values(users).find(u=>u.email===em.toLowerCase());
  if(!user||user.ph!==hash(pw)){set({err:'E-mail ou senha incorretos'});return}
  DB.saveSession({uid:user.id,name:user.name,email:user.email,plan:user.plan});
  const data=DB.userData(user.id);
  set({view:'app',user:{...user},data,tab:'home',err:'',ok:''});
};

window.doRegister=()=>{
  const nm=val('nm'),em=val('em'),pw=val('pw');
  if(!nm||!em||!pw){set({err:'Preencha todos os campos'});return}
  if(pw.length<6){set({err:'Senha precisa ter pelo menos 6 caracteres'});return}
  if(!/\S+@\S+\.\S+/.test(em)){set({err:'E-mail inválido'});return}
  const users=DB.users();
  if(Object.values(users).find(u=>u.email===em.toLowerCase())){set({err:'Este e-mail já está cadastrado'});return}
  const id=uid();
  const user={id,name:nm,email:em.toLowerCase(),ph:hash(pw),plan:S.plan||'free',createdAt:new Date().toISOString()};
  users[id]=user;
  DB.saveUsers(users);
  DB.saveData(id,emptyData());
  DB.saveSession({uid:id,name:nm,email:em.toLowerCase(),plan:user.plan});
  set({view:'app',user:{...user},data:emptyData(),tab:'home',err:'',ok:''});
};

function val(id){return(document.getElementById(id)||{}).value||''}

/* ════════════════════════════════════
   APP
════════════════════════════════════ */
const TABS=[
  {id:'home',    ic:'⚡',lb:'Início'},
  {id:'transactions',ic:'↕',lb:'Lançar'},
  {id:'cards',   ic:'▣',lb:'Cartões'},
  {id:'transfers',ic:'⇄',lb:'Mover'},
  {id:'reports', ic:'◈',lb:'Relatório'},
];

function appHTML(){
  const page={home:pageHome,transactions:pageTx,cards:pageCards,transfers:pageTrans,reports:pageReports}[S.tab]||pageHome;
  return`<div class="app">
    <div class="scroll pgaim" id="scrl">${page()}</div>
    ${S.sheet?sheetHTML():''}
    <div class="tabbar">${TABS.map(t=>`
      <button class="tb-btn${S.tab===t.id?' on':''}" onclick="goTab('${t.id}')">
        <div class="tb-ic">${t.ic}</div>
        <div class="tb-lb">${t.lb}</div>
      </button>`).join('')}
    </div>
  </div>`;
}

window.goTab=t=>set({tab:t,sheet:null});

/* HOME */
function pageHome(){
  const d=S.data,u=S.user;
  const total=d.balances.personal+d.balances.business;
  const inc=d.transactions.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0);
  const exp=d.transactions.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0);
  const pnd=d.transactions.filter(t=>t.status==='pending');
  const health=inc===0?0:Math.min(100,Math.round(((inc-exp)/inc)*100));
  const isPro=u.plan==='pro';
  return`
  <div class="phdr">
    <div>
      <div style="color:var(--sub);font-size:13px;margin-bottom:3px">Olá, ${u.name.split(' ')[0]} 👋</div>
      <div class="ptitle">Visão Geral</div>
    </div>
    <button onclick="doLogout()" style="background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:9px 13px;color:var(--sub);font-size:12px;font-weight:600">Sair</button>
  </div>
  <div class="plan-bar">
    <div>
      <div style="font-size:11px;color:var(--sub);margin-bottom:6px">Plano atual</div>
      <div class="badge ${isPro?'badge-pro':'badge-free'}">${isPro?'PRO ✦':'FREE'}</div>
    </div>
    ${!isPro
      ?`<button class="btn" style="background:linear-gradient(135deg,var(--b),var(--b2));color:#fff;padding:10px 16px;font-size:12px" onclick="upgrade()">Fazer upgrade →</button>`
      :`<div style="color:var(--b);font-size:13px;font-weight:700">✦ Acesso completo</div>`}
  </div>
  <div style="padding:0 20px 18px">
    <div class="c" style="background:linear-gradient(135deg,rgba(74,240,196,.07),var(--card));border-color:rgba(74,240,196,.2)">
      <div style="color:var(--sub);font-size:12px;margin-bottom:4px">Patrimônio total</div>
      <div style="font-family:var(--font-head);font-size:36px;font-weight:800;letter-spacing:-.03em">${fmt(total)}</div>
      <div style="margin-top:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:7px">
          <span style="color:var(--sub);font-size:12px">Saúde financeira</span>
          <span style="color:var(--green);font-weight:700;font-size:13px">${health}%</span>
        </div>
        <div style="height:5px;background:var(--border2);border-radius:99px">
          <div style="width:${health}%;height:100%;background:linear-gradient(90deg,var(--green),var(--p));border-radius:99px;transition:width 1.2s ease"></div>
        </div>
      </div>
    </div>
  </div>
  <div style="padding:0 20px 18px;display:flex;gap:12px;overflow-x:auto">
    ${[{k:'personal',l:'Pessoal',ic:'◎',c:'var(--p)'},{k:'business',l:'Empresa',ic:'◆',c:'var(--b)'}].map(a=>`
      <div class="c" style="min-width:190px;flex-shrink:0;border-color:${a.c}25;background:linear-gradient(135deg,${a.c}10,var(--card))">
        <div style="color:${a.c};font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">${a.ic} ${a.l}</div>
        <div style="font-family:var(--font-head);font-size:22px;font-weight:800">${fmt(d.balances[a.k])}</div>
        <div style="color:var(--muted);font-size:11px;margin-top:3px">disponível</div>
      </div>`).join('')}
  </div>
  <div style="padding:0 20px 18px;display:flex;gap:11px">
    ${[['Receitas',inc,'var(--green)','↑'],['Despesas',exp,'var(--red)','↓']].map(([l,v,c,ic])=>`
      <div class="c" style="flex:1;padding:15px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="color:var(--sub);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em">${l}</span>
          <span style="color:${c};font-size:16px;font-weight:900">${ic}</span>
        </div>
        <div style="font-family:var(--font-head);color:${c};font-size:17px;font-weight:800">${fmt(v)}</div>
      </div>`).join('')}
  </div>
  ${pnd.length?`
  <div style="padding:0 20px 18px">
    <div style="font-family:var(--font-head);font-size:14px;font-weight:700;margin-bottom:10px;color:var(--yellow)">⚠ ${pnd.length} pendência${pnd.length>1?'s':''}</div>
    ${pnd.map(t=>`<div style="background:rgba(255,209,102,.07);border:1px solid rgba(255,209,102,.18);border-radius:14px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div><div style="font-weight:600;font-size:14px">${t.desc||t.category}</div><div style="color:var(--yellow);font-size:12px;margin-top:2px">vence ${t.date}</div></div>
      <div style="color:var(--red);font-weight:800;font-size:14px;font-family:var(--font-head)">${fmt(t.amount)}</div>
    </div>`).join('')}
  </div>`:''}
  <div style="padding:0 20px">
    ${d.transactions.length?`

function fld(label,id,type,opts,placeholder,defVal){
  if(opts&&Array.isArray(opts)){
    return`<div class="field"><label>${label}</label><select id="${id}">${opts.map(o=>`<option value="${o.v||o}"${o.v===(placeholder||'')||(typeof o==='string'&&o===placeholder)?' selected':''}>${o.l||o}</option>`).join('')}</select></div>`;
  }
  return`<div class="field"><label>${label}</label><input type="${type}" id="${id}" placeholder="${placeholder||''}" value="${defVal||''}"/></div>`;
}

window.openSheet=s=>set({sheet:s,sf:{}});
window.closeSheet=()=>set({sheet:null,sf:{}});
window.setSF=(k,v)=>set(s=>({sf:{...s.sf,[k]:v}}));
window.setFT=v=>set({filterT:v});
window.setFA=v=>set({filterA:v});

window.saveTx=()=>{
  const amt=parseFloat(g('s-amt'));
  const desc=g('s-desc'),cat=g('s-cat'),acct=g('s-acct')||'personal';
  const meth=g('s-meth')||'PIX',date=g('s-date')||today(),stat=g('s-stat')||'paid';
  const type=S.sf.type||'expense';
  if(!amt||isNaN(amt)){alert('Informe o valor');return}
  if(!cat){alert('Escolha uma categoria');return}
  const tx={id:uid(),type,amount:amt,desc:desc||cat,category:cat,account:acct,method:meth,date,status:stat};
  set(s=>{
    const data={...s.data,transactions:[tx,...s.data.transactions],balances:{...s.data.balances}};
    data.balances[acct]+=(type==='income'?amt:-amt);
    DB.saveData(s.user.id,data);
    return{data,sheet:null,sf:{}};
  });
};

window.saveCard=()=>{
  const name=g('c-name'),lim=parseFloat(g('c-lim'));
  const acct=g('c-acct')||'personal',clos=parseInt(g('c-clos')||'15'),due=parseInt(g('c-due')||'22');
  const color=g('c-col')||'#4af0c4';
  if(!name){alert('Informe o nome do cartão');return}
  if(!lim||isNaN(lim)){alert('Informe o limite');return}
  const card={id:uid(),name,limit:lim,used:0,account:acct,closing:clos,due,color};
  set(s=>{
    const data={...s.data,cards:[...s.data.cards,card]};
    DB.saveData(s.user.id,data);
    return{data,sheet:null,sf:{}};
  });
};

window.doTransfer=()=>{
  const from=g('tf-from')||'personal',to=g('tf-to')||'business';
  const amt=parseFloat(g('tf-amt')),desc=g('tf-desc')||'';
  if(!amt||isNaN(amt)){alert('Informe o valor');return}
  if(from===to){alert('Selecione contas diferentes');return}
  set(s=>{
    const data={...s.data,balances:{...s.data.balances},transfers:[{id:uid(),from,to,amount:amt,desc,date:today()},...s.data.transfers]};
    data.balances[from]-=amt;data.balances[to]+=amt;
    DB.saveData(s.user.id,data);
    return{data};
  });
  try{document.getElementById('tf-amt').value='';document.getElementById('tf-desc').value=''}catch(e){}
};

(function(){
  const sess=DB.session();
  if(sess&&sess.uid){
    const users=DB.users();
    const user=users[sess.uid];
    if(user){set({view:'app',user:{...user},data:DB.userData(sess.uid),tab:'home'});return}
  }
  set({view:'auth',authTab:'login'});
})();
</script>
</body>
</html>
